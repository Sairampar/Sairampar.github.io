<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahapurush Sairam's Chatbot</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 90%;
      max-width: 1200px;
      height: 90vh;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      overflow: hidden;
    }

    /* Login Panel */
    .login-panel {
      width: 350px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      padding: 40px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo h1 {
      color: #4a5568;
      font-size: 24px;
      margin-top: 10px;
    }

    .google-btn {
      width: 100%;
      padding: 15px;
      background: white;
      border: 2px solid #4285f4;
      border-radius: 50px;
      color: #4285f4;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .google-btn:hover {
      background: #4285f4;
      color: white;
    }

    .google-btn i {
      font-size: 20px;
    }

    .user-info {
      width: 100%;
      text-align: center;
      display: none;
    }

    .user-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 15px;
      overflow: hidden;
      border: 3px solid #4299e1;
    }

    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-name {
      font-size: 20px;
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 5px;
    }

    .user-email {
      color: #718096;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .logout-btn {
      padding: 10px 30px;
      background: #f56565;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: #c53030;
    }

    /* Chat Panel */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #f7fafc;
    }

    .chat-header {
      padding: 20px;
      background: white;
      border-bottom: 2px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 {
      color: #2d3748;
      font-size: 20px;
    }

    .chat-controls button {
      padding: 8px 15px;
      margin-left: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #e2e8f0;
      color: #4a5568;
      transition: all 0.3s;
    }

    .chat-controls button:hover {
      background: #cbd5e0;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 70%;
      padding: 12px 18px;
      border-radius: 15px;
      position: relative;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: #4299e1;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .message.bot {
      align-self: flex-start;
      background: white;
      color: #2d3748;
      border-bottom-left-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .timestamp {
      font-size: 10px;
      margin-top: 5px;
      opacity: 0.7;
    }

    .chat-input-area {
      padding: 20px;
      background: white;
      border-top: 2px solid #e2e8f0;
      display: flex;
      gap: 10px;
    }

    .chat-input-area input {
      flex: 1;
      padding: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      outline: none;
      font-size: 16px;
      transition: all 0.3s;
    }

    .chat-input-area input:focus {
      border-color: #4299e1;
    }

    .chat-input-area input:disabled {
      background: #edf2f7;
      cursor: not-allowed;
    }

    .chat-input-area button {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 10px;
      background: #4299e1;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .chat-input-area button:hover:not(:disabled) {
      background: #2b6cb0;
      transform: scale(1.05);
    }

    .chat-input-area button:disabled {
      background: #cbd5e0;
      cursor: not-allowed;
    }

    /* History Panel */
    .history-panel {
      width: 300px;
      background: white;
      border-left: 2px solid #e2e8f0;
      padding: 20px;
      overflow-y: auto;
    }

    .history-panel h3 {
      color: #2d3748;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e2e8f0;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      padding: 10px;
      background: #f7fafc;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border-left: 3px solid #4299e1;
    }

    .history-item:hover {
      background: #edf2f7;
      transform: translateX(-5px);
    }

    .history-question {
      font-weight: bold;
      color: #2d3748;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .history-answer {
      color: #718096;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .history-time {
      color: #a0aec0;
      font-size: 10px;
    }

    .empty-history {
      color: #a0aec0;
      text-align: center;
      padding: 20px;
      font-style: italic;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #e2e8f0;
      border-top-color: #4299e1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <!-- Login Panel -->
    <div class="login-panel">
      <div class="logo">
        <i class="fas fa-robot" style="font-size: 50px; color: #4299e1;"></i>
        <h1>Mahapurush Sairam</h1>
      </div>

      <div id="loginContent">
        <button class="google-btn" id="googleLoginBtn">
          <i class="fab fa-google"></i> Login with Google
        </button>
      </div>

      <div class="user-info" id="userInfo">
        <div class="user-avatar" id="userAvatar">
          <img src="" alt="Profile" id="avatarImg">
        </div>
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="chat-header">
        <h2><i class="fas fa-comments"></i> Neon Chat</h2>
        <div class="chat-controls">
          <button id="minimizeBtn"><i class="fas fa-minus"></i></button>
          <button id="clearChatBtn"><i class="fas fa-trash"></i></button>
        </div>
      </div>

      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          🙏 Welcome! Please login with Google to start chatting.
          <div class="timestamp">Just now</div>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Type your message..." disabled>
        <button id="sendButton" disabled><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>

    <!-- History Panel -->
    <div class="history-panel">
      <h3><i class="fas fa-history"></i> Chat History</h3>
      <div class="history-list" id="historyList">
        <div class="empty-history">Login to see your chat history</div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDCKcQOeZmN_OxwO_mUWDZnzkoKhLCdeFs",
      authDomain: "mahapurush-sairam.firebaseapp.com",
      projectId: "mahapurush-sairam",
      storageBucket: "mahapurush-sairam.firebasestorage.app",
      messagingSenderId: "151652517717",
      appId: "1:151652517717:web:0d00e5ad2f3f250577d1dc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.auth = auth;
    window.provider = provider;
    window.signInWithPopup = signInWithPopup;
    window.signOut = signOut;
    window.onAuthStateChanged = onAuthStateChanged;

    console.log("Firebase Ready!");
  </script>

  <script>
    // DOM Elements
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const userInfo = document.getElementById('userInfo');
    const loginContent = document.getElementById('loginContent');
    const avatarImg = document.getElementById('avatarImg');
    const userName = document.getElementById('userName');
    const userEmail = document.getElementById('userEmail');
    const logoutBtn = document.getElementById('logoutBtn');
    const userInput = document.getElementById('userInput');
    const sendButton = document.getElementById('sendButton');
    const chatMessages = document.getElementById('chatMessages');
    const historyList = document.getElementById('historyList');
    const minimizeBtn = document.getElementById('minimizeBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');

    // State
    let currentUser = null;
    let chatHistory = [];
    let isMinimized = false;

    // Check auth state
    window.onAuthStateChanged(window.auth, (user) => {
      if (user) {
        // User is logged in
        currentUser = user;
        loginContent.style.display = 'none';
        userInfo.style.display = 'block';
        avatarImg.src = user.photoURL || 'https://via.placeholder.com/80';
        userName.textContent = user.displayName || 'User';
        userEmail.textContent = user.email || '';
        
        userInput.disabled = false;
        sendButton.disabled = false;
        
        addMessage('bot', `🙏 Namaste ${user.displayName?.split(' ')[0] || 'User'}! How can I help you?`);
        loadHistory();
      } else {
        // User is logged out
        currentUser = null;
        loginContent.style.display = 'block';
        userInfo.style.display = 'none';
        
        userInput.disabled = true;
        sendButton.disabled = true;
        
        chatMessages.innerHTML = '<div class="message bot">🙏 Welcome! Please login with Google to start chatting.<div class="timestamp">Just now</div></div>';
        historyList.innerHTML = '<div class="empty-history">Login to see your chat history</div>';
      }
    });

    // Google Login
    googleLoginBtn.addEventListener('click', async () => {
      try {
        googleLoginBtn.innerHTML = '<span class="spinner"></span> Loading...';
        googleLoginBtn.disabled = true;
        await window.signInWithPopup(window.auth, window.provider);
      } catch (error) {
        alert('Login failed: ' + error.message);
        googleLoginBtn.innerHTML = '<i class="fab fa-google"></i> Login with Google';
        googleLoginBtn.disabled = false;
      }
    });

    // Logout
    logoutBtn.addEventListener('click', async () => {
      await window.signOut(window.auth);
    });

    // Add message
    function addMessage(sender, text) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      
      const time = new Date();
      const timeStr = time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      messageDiv.innerHTML = `
        ${text}
        <div class="timestamp">${timeStr}</div>
      `;
      
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      
      if (currentUser) {
        saveToHistory(sender, text);
      }
    }

    // Save to history
    function saveToHistory(sender, text) {
      const historyItem = {
        sender,
        text,
        time: new Date().toISOString()
      };
      
      chatHistory.push(historyItem);
      
      if (currentUser) {
        localStorage.setItem(`chat_${currentUser.uid}`, JSON.stringify(chatHistory));
      }
      
      updateHistory();
    }

    // Load history
    function loadHistory() {
      if (currentUser) {
        const saved = localStorage.getItem(`chat_${currentUser.uid}`);
        if (saved) {
          chatHistory = JSON.parse(saved);
          updateHistory();
        }
      }
    }

    // Update history display
    function updateHistory() {
      historyList.innerHTML = '';
      
      if (chatHistory.length === 0) {
        historyList.innerHTML = '<div class="empty-history">No chat history yet</div>';
        return;
      }
      
      const recent = [...chatHistory].reverse().slice(0, 10);
      
      recent.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-question">${item.sender === 'user' ? '👤 You' : '🤖 Sairam'}</div>
          <div class="history-answer">${item.text.substring(0, 50)}${item.text.length > 50 ? '...' : ''}</div>
          <div class="history-time">${new Date(item.time).toLocaleString()}</div>
        `;
        div.onclick = () => addMessage('bot', `📝 ${item.text}`);
        historyList.appendChild(div);
      });
    }

    // Send message
    async function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      
      addMessage('user', text);
      userInput.value = '';
      
      // Show typing
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message bot';
      typingDiv.id = 'typing';
      typingDiv.innerHTML = '<span class="spinner"></span> Thinking...';
      chatMessages.appendChild(typingDiv);
      
      // Get bot reply
      let reply = "I'm here to help!";
      
      // Check for model question
      if (text.toLowerCase().includes('model') || text.toLowerCase().includes('who made you')) {
        reply = "🙏 Sairam's Model - Created by Mahapurush Sairam";
      } else {
        // Simple responses
        if (text.toLowerCase().includes('hello') || text.toLowerCase().includes('hi')) {
          reply = "🙏 Namaste! How can I help you today?";
        } else if (text.toLowerCase().includes('thank')) {
          reply = "🙏 You're welcome!";
        } else if (text.toLowerCase().includes('bye')) {
          reply = "🙏 Goodbye! Have a blessed day!";
        }
      }
      
      // Remove typing and add reply
      document.getElementById('typing')?.remove();
      setTimeout(() => {
        addMessage('bot', reply);
      }, 500);
    }

    // Event listeners
    sendButton.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    minimizeBtn.addEventListener('click', () => {
      const messages = document.querySelector('.chat-messages');
      const input = document.querySelector('.chat-input-area');
      
      if (isMinimized) {
        messages.style.display = 'flex';
        input.style.display = 'flex';
        minimizeBtn.innerHTML = '<i class="fas fa-minus"></i>';
      } else {
        messages.style.display = 'none';
        input.style.display = 'none';
        minimizeBtn.innerHTML = '<i class="fas fa-plus"></i>';
      }
      
      isMinimized = !isMinimized;
    });

    clearChatBtn.addEventListener('click', () => {
      if (confirm('Clear all messages?')) {
        chatMessages.innerHTML = '<div class="message bot">Chat cleared. Start a new conversation!<div class="timestamp">Just now</div></div>';
      }
    });
  </script>
</body>
</html>
